<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div vs span</title>
    <style>
    body{
        background-color: black;
        color:white;
    }
    </style>
</head>
<body>
    <div style="background-color: red;height: 100px;width: 100%;">

        <p style="text-align:center" >SECTION 1</p>
         </div>
    
    <div style="background-color: blue;height: 100px;">
            <p style="text-align: center;">SECTION2 </p>
    </div>
            
    
            <p style="text-align: center; color: orange;">Home <span style="color: white;">page</span></p>
   
</html>
